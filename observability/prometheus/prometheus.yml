global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metrics arrive at the app via OTLP push → OTel Collector receives them
  # → Collector exposes a Prometheus endpoint → Prometheus scrapes here.
  # The app itself does NOT need micrometer-registry-prometheus.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:9464']
