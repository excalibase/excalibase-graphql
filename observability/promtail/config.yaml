server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [excalibase-graphql]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container
      - replacement: excalibase
        target_label: job

    pipeline_stages:
      # Parse the top-level fields from ECS JSON logs
      - json:
          expressions:
            traceId: traceId
            message: message
            log_level: log

      # Extract level from the nested log object via regex
      - regex:
          expression: '"level":"(?P<level>[^"]+)"'
          source: log_level

      # Promote level as a Loki stream label
      - labels:
          level:
