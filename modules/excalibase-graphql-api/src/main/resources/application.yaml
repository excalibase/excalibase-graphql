server:
  port: 10000
  tomcat:
    threads:
      max: 200  # Limit max threads (virtual threads handle concurrency)
      min-spare: 10
    max-connections: 10000
    accept-count: 100
    connection-timeout: 20000
spring:
  application:
    name: Excalibase graphql
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/dvdrental
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 50  # Limit connection pool
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jackson:
    default-property-inclusion: non_null  # Reduce JSON serialization overhead
  jmx:
    enabled: false  # Disable JMX to save memory

# Actuator + Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    enable:
      jvm: true
      process: true
      system: true
    distribution:
      percentiles-histogram:
        http.server.requests: false  # Disable histogram to save memory
  # OTLP export — all three signals go to the OTel Collector on port 4318
  # Actuator is kept only for health + info; metrics/traces/logs go via OTLP push.
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        step: 30s        # push interval
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
  # Tracing: sample 100% in dev; tune via OTEL_TRACES_SAMPLER_ARG in prod
  tracing:
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}

app:
  schemas: dvdrental
  database-type: postgres
  max-rows: 30
  max-query-depth: 0
  cache:
    schema-ttl-minutes: 30  # Schema cache TTL in minutes (default: 30 minutes)
    role-privileges-ttl-minutes: 30  # Role privileges cache TTL in minutes (default: 30 minutes)
    graphql-ttl-minutes: 30  # GraphQL cache TTL in minutes (default: 30 minutes)
  security:
    role-based-schema: true
    user-context-enabled: true
    user-id-extractor-type: header
    user-id-header: X-User-Id
  nats:
    enabled: false  # Enable NATS CDC subscription from excalibase-watcher (default: false)
    url: nats://localhost:4222  # NATS server URL
    stream-name: CDC  # JetStream stream name
    subject-prefix: cdc  # Subject prefix (events on cdc.{schema}.{table})

# GraphQL Security Configuration - Production Defaults
# Based on GraphQL.org security recommendations and OWASP guidelines
graphql:
  security:
    max-query-depth: 20       # Prevent deeply nested queries (default: 20)
    max-query-complexity: 10000 # Prevent expensive operations (default: 1000)
    max-query-tokens: 5000    # Prevent parser DoS (default: 5000)
    max-query-characters: 50000 # 50KB query size limit (default: 50KB)
    max-whitespace-tokens: 10000
    max-rule-depth: 50
logging:
  level:
    root: ${log.level.root:info}
    org:
      springframework: ${log.level.spring:info}
    io:
      github:
        excalibase: ${log.level.app:info}
  # Structured JSON logging (ECS format) — parseable by any log collector (Loki, OpenSearch, etc.)
  # Override with LOG_FORMAT=plain for local dev coloured output
#  structured:
#    format:
#      console: ${LOG_FORMAT:gelf}
  pattern:
    console: "%d{ISO8601} %highlight(%-5level) [%blue(%t)] [%blue(%X{remoteAddr})] %yellow(%C{1}): %msg%n%throwable"