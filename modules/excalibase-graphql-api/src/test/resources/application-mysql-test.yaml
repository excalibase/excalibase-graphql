server:
  port: 0

spring:
  application:
    name: Excalibase graphql MySQL Test
  threads:
    virtual:
      enabled: true
  # Datasource injected via @DynamicPropertySource in MysqlGraphqlControllerTest

app:
  allowed-schema: testdb
  database-type: MySQL
  max-query-depth: 0   # disabled in tests; production defaults to 10
  security:
  nats:
    enabled: false

spring.graphql:
  graphiql:
    enabled: false
  path: /graphql
  websocket:
    path: /graphql

logging:
  level:
    root: warn
    io.github.excalibase: info
