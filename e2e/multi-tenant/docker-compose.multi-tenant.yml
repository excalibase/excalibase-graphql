services:
  tenant-a-postgres:
    image: postgres:16-alpine
    container_name: mt-tenant-a-postgres
    environment:
      POSTGRES_DB: tenant_a_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    ports:
      - "5440:5432"
    volumes:
      - ./sql/init-tenant-a.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenant_a_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - multi-tenant-network

  tenant-b-postgres:
    image: postgres:16-alpine
    container_name: mt-tenant-b-postgres
    environment:
      POSTGRES_DB: tenant_b_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    ports:
      - "5441:5432"
    volumes:
      - ./sql/init-tenant-b.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenant_b_db"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - multi-tenant-network

  mock-vault:
    image: wiremock/wiremock:3.10.0
    container_name: mt-mock-vault
    volumes:
      - ./wiremock:/home/wiremock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - multi-tenant-network

  excalibase-auth:
    image: excalibase/excalibase-auth
    container_name: mt-excalibase-auth
    build:
      context: ../../../excalibase-auth
    environment:
      PROVISIONING_URL: http://mock-vault:8080/api
      PROVISIONING_PAT: test-pat
      PORT: "24000"
    ports:
      - "24003:24000"
    depends_on:
      tenant-a-postgres:
        condition: service_healthy
      tenant-b-postgres:
        condition: service_healthy
      mock-vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:24000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - multi-tenant-network

  excalibase-app:
    image: excalibase/excalibase-graphql
    container_name: mt-excalibase-graphql
    environment:
      # NO default datasource — pure multi-tenant mode
      SPRING_DATASOURCE_URL: ""
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      # HikariCP per tenant datasource
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 10000

      SPRING_THREADS_VIRTUAL_ENABLED: true

      SERVER_PORT: 10000
      APP_SCHEMAS: tenant
      APP_DATABASE_TYPE: postgres
      APP_MAX_ROWS: 30

      # JWT + multi-tenant vault credentials
      APP_SECURITY_JWT_ENABLED: true
      APP_SECURITY_AUTH_JWKS_URL: http://excalibase-auth:24000/.well-known/jwks.json
      APP_SECURITY_MULTI_TENANT_PROVISIONING_URL: http://mock-vault:8080/api
      APP_SECURITY_MULTI_TENANT_PROVISIONING_PAT: test-pat

      # NATS CDC with tenant-in-subject — NatsCDCService parses tenant from subject
      APP_NATS_ENABLED: true
      APP_NATS_URL: nats://nats:4222
      APP_NATS_STREAM_NAME: CDC
      APP_NATS_SUBJECT_PREFIX: cdc
      APP_NATS_TENANT_IN_SUBJECT: true
    ports:
      - "10003:10000"
    depends_on:
      tenant-a-postgres:
        condition: service_healthy
      tenant-b-postgres:
        condition: service_healthy
      mock-vault:
        condition: service_healthy
      excalibase-auth:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - multi-tenant-network
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '0.5'

  # ── CDC infra (shared NATS broker, per-tenant watcher-go) ───────────────────
  nats:
    image: nats:2.10
    container_name: mt-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4224:4222"
      - "8224:8222"
    healthcheck:
      test: ["CMD", "/nats-server", "--help"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - multi-tenant-network

  # Pre-provision the CDC stream with wildcard subjects. Watcher-go intentionally
  # does not create/mutate streams — ops own topology so per-tenant watchers
  # don't fight over the subjects list.
  nats-init:
    image: natsio/nats-box:latest
    container_name: mt-nats-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        nats --server=nats://nats:4222 stream add CDC --subjects='cdc.>' --storage=memory --retention=limits --max-age=5m --discard=old --max-msgs=-1 --max-bytes=-1 --max-msg-size=-1 --replicas=1 --dupe-window=2m --no-allow-rollup --no-deny-delete --no-deny-purge --defaults || true
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - multi-tenant-network
    restart: "no"

  watcher-tenant-a:
    image: excalibase/excalibase-watcher-go:local
    container_name: mt-watcher-a
    command: ["--config", "/config/config.yaml"]
    environment:
      WATCHER_POSTGRES_USERNAME: postgres
      WATCHER_POSTGRES_PASSWORD: postgres
      WATCHER_NATS_URL: nats://nats:4222
    volumes:
      - ./watcher-go-tenant-a.yaml:/config/config.yaml:ro
    healthcheck:
      disable: true
    depends_on:
      tenant-a-postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    networks:
      - multi-tenant-network

  watcher-tenant-b:
    image: excalibase/excalibase-watcher-go:local
    container_name: mt-watcher-b
    command: ["--config", "/config/config.yaml"]
    environment:
      WATCHER_POSTGRES_USERNAME: postgres
      WATCHER_POSTGRES_PASSWORD: postgres
      WATCHER_NATS_URL: nats://nats:4222
    volumes:
      - ./watcher-go-tenant-b.yaml:/config/config.yaml:ro
    healthcheck:
      disable: true
    depends_on:
      tenant-b-postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      nats-init:
        condition: service_completed_successfully
    networks:
      - multi-tenant-network

networks:
  multi-tenant-network:
    driver: bridge
