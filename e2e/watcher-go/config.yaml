postgres:
  enabled: true
  url: "postgres://postgres:5432/hana?replication=database"
  slot_name: cdc_slot_go
  publication_name: cdc_publication_go
  create_slot: true
  create_publication: true
  snapshot_mode: none
  capture_ddl: false

mysql:
  enabled: false

nats:
  enabled: true
  url: "nats://nats:4222"
  stream_name: CDC
  subject_prefix: cdc
  max_age_minutes: 5
  storage: memory

health:
  port: 8080
  bind_address: "0.0.0.0"

metrics:
  enabled: true
