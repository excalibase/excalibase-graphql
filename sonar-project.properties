sonar.projectKey=excalibase-graphql
sonar.projectName=Excalibase Graphql

# Source/test paths (multi-module: scanner picks up from each pom)
sonar.sourceEncoding=UTF-8
sonar.java.source=25
sonar.java.target=25

# Coverage — point at JaCoCo aggregate report
sonar.coverage.jacoco.xmlReportPaths=modules/excalibase-graphql-api/target/site/jacoco-aggregate/jacoco.xml

# ─── Exclusions ─────────────────────────────────────────────────────────────

# Generated code, benchmarks, scripts, docs, boilerplate
sonar.exclusions=\
  **/target/**,\
  **/generated-sources/**,\
  **/generated-test-sources/**,\
  **/*.sql,\
  docs/**,\
  scripts/**,\
  e2e/**,\
  **/*.yml,\
  **/*.yaml,\
  **/Dockerfile,\
  plan.md,\
  **/ExcalibaseGraphqlApplication.java,\
  **/config/**,\
  **/constant/**,\
  **/exception/**,\
  **/model/**,\
  **/annotation/**,\
  **/scalar/**,\
  **/RuntimeHints*.java,\
  **/dto/**

# Exclude from coverage calculation (in addition to file exclusions above)
sonar.coverage.exclusions=\
  **/ExcalibaseGraphqlApplication.java,\
  **/config/**,\
  **/constant/**,\
  **/exception/**,\
  **/model/**,\
  **/annotation/**,\
  **/scalar/**,\
  **/dto/**

# Exclude test files from main issue count (they're already under src/test)
sonar.test.exclusions=**/src/test/**

# ─── Rule tuning for SQL/GraphQL builder code ───────────────────────────────

# S1192: Duplicated string literals — SQL keywords like "SELECT", "WHERE" repeated in builders.
# These are string fragments used to build SQL; extracting to constants adds noise without value.
# S3776: Cognitive complexity — SQL compilers/schema loaders are inherently complex.
# Breaking them into tiny methods hurts readability of the query-build flow.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8

# Whole SQL/GraphQL compiler layer (starter + postgres + mysql + nosql compilers)
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/compiler/**/*.java
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/compiler/**/*.java

# NoSQL layer (document controller, service, schema manager are builder-ish)
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=**/nosql/**/*.java
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S3776
sonar.issue.ignore.multicriteria.e4.resourceKey=**/nosql/**/*.java

# Schema loaders (bulk introspection queries have repeated SQL fragments)
sonar.issue.ignore.multicriteria.e5.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e5.resourceKey=**/schema/**/*SchemaLoader.java
sonar.issue.ignore.multicriteria.e6.ruleKey=java:S3776
sonar.issue.ignore.multicriteria.e6.resourceKey=**/schema/**/*SchemaLoader.java

# REST / GraphQL / OpenAPI generators (spec keys repeat naturally)
sonar.issue.ignore.multicriteria.e7.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e7.resourceKey=**/rest/**/*.java
sonar.issue.ignore.multicriteria.e8.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e8.resourceKey=**/OpenApiGenerator.java
