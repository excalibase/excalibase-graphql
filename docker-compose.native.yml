services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: excalibase-postgres-native
    environment:
      POSTGRES_DB: hana
      POSTGRES_USER: hana001
      POSTGRES_PASSWORD: password123
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_native_data:/var/lib/postgresql/data
      - ./scripts/initdb.sql:/docker-entrypoint-initdb.d/01-initdb.sql:ro
      - ./scripts/initdb-complex-domain.sql:/docker-entrypoint-initdb.d/02-complex-domain.sql:ro
      - ./scripts/initdb-ecommerce.sql:/docker-entrypoint-initdb.d/03-ecommerce.sql:ro
      - ./scripts/initdb-kanban.sql:/docker-entrypoint-initdb.d/04-kanban.sql:ro
      - ./scripts/initdb-clinic.sql:/docker-entrypoint-initdb.d/05-clinic.sql:ro
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
      -c shared_preload_libraries=''
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hana001 -d hana"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - excalibase-native-network
    restart: unless-stopped

  excalibase-app:
    image: excalibase/excalibase-graphql:native
    container_name: excalibase-graphql-native
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hana
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 5
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 300000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 900000

      SERVER_TOMCAT_THREADS_MAX: 200
      SERVER_TOMCAT_THREADS_MIN_SPARE: 10
      SERVER_TOMCAT_MAX_CONNECTIONS: 10000
      SERVER_TOMCAT_ACCEPT_COUNT: 100
      SERVER_TOMCAT_CONNECTION_TIMEOUT: 20000

      SPRING_THREADS_VIRTUAL_ENABLED: true
      SERVER_PORT: 10000
      APP_DATABASE_TYPE: postgres
      APP_MAX_ROWS: 30

      APP_SECURITY_JWT_ENABLED: true
      APP_SECURITY_AUTH_JWKS_URL: http://excalibase-auth:24000/.well-known/jwks.json
      APP_SECURITY_MULTI_TENANT_PROVISIONING_URL: http://mock-vault:8080/api
      APP_SECURITY_MULTI_TENANT_PROVISIONING_PAT: test-pat

      APP_NATS_ENABLED: true
      APP_NATS_URL: nats://nats:4222
      APP_NATS_STREAM_NAME: CDC
      APP_NATS_SUBJECT_PREFIX: cdc
    ports:
      - "10000:10000"
    healthcheck:
      test: ["CMD", "/usr/bin/busybox", "wget", "-qO-", "http://localhost:10000/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      excalibase-watcher:
        condition: service_healthy
      mock-vault:
        condition: service_healthy
      excalibase-auth:
        condition: service_healthy
    networks:
      - excalibase-native-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
          cpus: '0.25'

  nats:
    image: nats:2.10
    container_name: excalibase-nats-native
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "/nats-server", "--help"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - excalibase-native-network
    restart: unless-stopped

  excalibase-watcher:
    image: excalibase/excalibase-watcher
    container_name: excalibase-watcher-native
    environment:
      APP_CDC_POSTGRES_URL: jdbc:postgresql://postgres:5432/hana
      APP_CDC_POSTGRES_USERNAME: hana001
      APP_CDC_POSTGRES_PASSWORD: password123
      APP_CDC_POSTGRES_ENABLED: true
      APP_CDC_SLOT_NAME: cdc_slot
      APP_CDC_PUBLICATION_NAME: cdc_publication
      APP_CDC_CREATE_SLOT_IF_NOT_EXISTS: true
      APP_CDC_CREATE_PUBLICATION_IF_NOT_EXISTS: true
      APP_NATS_URL: nats://nats:4222
      APP_NATS_STREAM_NAME: CDC
      APP_NATS_SUBJECT_PREFIX: cdc
      APP_NATS_ENABLED: true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - excalibase-native-network
    restart: unless-stopped

  mock-vault:
    image: wiremock/wiremock:3.10.0
    container_name: excalibase-mock-vault-native
    volumes:
      - ./e2e/wiremock:/home/wiremock
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/__admin/mappings"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - excalibase-native-network
    restart: unless-stopped

  excalibase-auth:
    image: excalibase/excalibase-auth
    container_name: excalibase-auth-native
    build:
      context: ../excalibase-auth
    environment:
      PROVISIONING_URL: http://mock-vault:8080/api
      PROVISIONING_PAT: test-pat
      PORT: "24000"
    ports:
      - "24000:24000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:24000/healthz"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - excalibase-native-network
    restart: unless-stopped

volumes:
  postgres_native_data:
    driver: local

networks:
  excalibase-native-network:
    driver: bridge
