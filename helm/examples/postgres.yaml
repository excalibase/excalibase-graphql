# Example: PostgreSQL with NATS CDC subscriptions (via excalibase-watcher)
# helm install excalibase excalibase-graphql/ -f examples/postgres.yaml

replicaCount: 2

image:
  repository: excalibase/excalibase-graphql
  tag: "latest"

database:
  url: "jdbc:postgresql://postgres-service:5432/mydb"
  # Use existingSecret in production:
  # existingSecret: "my-db-secret"
  username: "myuser"
  password: "changeme"

app:
  allowedSchema: "public"
  nats:
    enabled: true
    url: "nats://nats-service:4222"
    streamName: "CDC"
    subjectPrefix: "cdc"

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: graphql.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: graphql-tls
      hosts:
        - graphql.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
