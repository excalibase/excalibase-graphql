# Example: MySQL backend
# helm install excalibase excalibase-graphql/ -f examples/mysql.yaml

database:
  url: "jdbc:mysql://mysql-service:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true"
  username: "myuser"
  password: "changeme"

app:
  allowedSchema: "mydb"
  nats:
    enabled: false   # Enable when excalibase-watcher is deployed

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: graphql-mysql.example.com
      paths:
        - path: /
          pathType: Prefix
