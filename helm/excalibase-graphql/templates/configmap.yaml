{{- $isMysql := or (eq .Values.database.type "mysql") (hasPrefix "jdbc:mysql" .Values.database.url) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "excalibase-graphql.fullname" . }}
  labels:
    {{- include "excalibase-graphql.labels" . | nindent 4 }}
data:
  # JVM
  JAVA_TOOL_OPTIONS: {{ .Values.jvm.opts | quote }}

  # Database
  SPRING_DATASOURCE_URL: {{ .Values.database.url | quote }}
  {{- if $isMysql }}
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
  {{- else }}
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
  {{- end }}

  # HikariCP
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: {{ .Values.hikari.maximumPoolSize | quote }}
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: {{ .Values.hikari.minimumIdle | quote }}
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: {{ .Values.hikari.connectionTimeout | quote }}
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: {{ .Values.hikari.idleTimeout | quote }}
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: {{ .Values.hikari.maxLifetime | int | quote }}

  # Tomcat
  SERVER_TOMCAT_THREADS_MAX: {{ .Values.tomcat.threadsMax | quote }}
  SERVER_TOMCAT_THREADS_MIN_SPARE: {{ .Values.tomcat.threadsMinSpare | quote }}
  SERVER_TOMCAT_MAX_CONNECTIONS: {{ .Values.tomcat.maxConnections | quote }}
  SERVER_TOMCAT_ACCEPT_COUNT: {{ .Values.tomcat.acceptCount | quote }}
  SERVER_TOMCAT_CONNECTION_TIMEOUT: {{ .Values.tomcat.connectionTimeout | quote }}

  # Virtual threads
  SPRING_THREADS_VIRTUAL_ENABLED: {{ .Values.virtualThreads.enabled | quote }}

  # Application
  SERVER_PORT: {{ .Values.app.port | quote }}
  APP_SCHEMAS: {{ .Values.app.allowedSchema | quote }}
  APP_DATABASE_TYPE: {{ if $isMysql }}"mysql"{{ else }}"postgres"{{ end }}

  # JWT verification
  APP_SECURITY_JWT_ENABLED: {{ .Values.app.security.jwtEnabled | quote }}
  {{- if .Values.app.security.auth.jwksUrl }}
  APP_SECURITY_AUTH_JWKS_URL: {{ .Values.app.security.auth.jwksUrl | quote }}
  {{- end }}
  {{- if .Values.app.security.auth.jwksTtlMinutes }}
  APP_SECURITY_AUTH_JWKS_TTL_MINUTES: {{ .Values.app.security.auth.jwksTtlMinutes | quote }}
  {{- end }}
  {{- if .Values.app.security.auth.hmacSecret }}
  APP_SECURITY_AUTH_HMAC_SECRET: {{ .Values.app.security.auth.hmacSecret | quote }}
  {{- end }}
  # Multi-tenant datasource routing (optional)
  {{- if .Values.app.security.multiTenant.provisioningUrl }}
  APP_SECURITY_MULTI_TENANT_PROVISIONING_URL: {{ .Values.app.security.multiTenant.provisioningUrl | quote }}
  {{- end }}

  # NATS CDC subscription (events from excalibase-watcher)
  APP_NATS_ENABLED: {{ .Values.app.nats.enabled | quote }}
  APP_NATS_URL: {{ .Values.app.nats.url | quote }}
  APP_NATS_STREAM_NAME: {{ .Values.app.nats.streamName | quote }}
  APP_NATS_SUBJECT_PREFIX: {{ .Values.app.nats.subjectPrefix | quote }}
