# Default values for excalibase-graphql

replicaCount: 1

image:
  repository: excalibase/excalibase-graphql
  pullPolicy: IfNotPresent
  # Use "native" tag for GraalVM native binary (faster startup, lower memory)
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 10000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: excalibase.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: excalibase-tls
  #   hosts:
  #     - excalibase.local

# ---------------------------------------------------------------------------
# Database connection
# ---------------------------------------------------------------------------
database:
  # Full JDBC URL — the database type is auto-detected from the URL prefix:
  #   jdbc:postgresql://...  →  postgres
  #   jdbc:mysql://...       →  mysql
  # PostgreSQL example: jdbc:postgresql://postgres-host:5432/mydb
  # MySQL example:      jdbc:mysql://mysql-host:3306/mydb
  url: ""

  # Override auto-detection only if needed (e.g. custom JDBC wrapper URLs)
  # Leave empty to auto-detect from url above.
  type: ""

  # Inline credentials (use existingSecret in production)
  username: ""
  password: ""

  # Reference an existing Secret instead of inline credentials
  # The secret must have keys matching existingSecretUsernameKey / existingSecretPasswordKey
  existingSecret: ""
  existingSecretUsernameKey: "username"
  existingSecretPasswordKey: "password"

# ---------------------------------------------------------------------------
# Application settings
# ---------------------------------------------------------------------------
app:
  # Schema/database name to expose via GraphQL
  allowedSchema: "public"

  # Server port (must match service.port)
  port: 10000

  security:
    # Enable JWT verification. When true, the JWKS endpoint or a static public key is required.
    # Invalid tokens return 401. Missing tokens are allowed (RLS at the DB level controls access).
    jwtEnabled: false

    auth:
      # Mode 1 — JWKS endpoint (excalibase-auth ES256, Auth0, Keycloak, any OIDC provider)
      jwksUrl: ""
      # JWKS key cache TTL in minutes (default: 60)
      jwksTtlMinutes: 60
      # Mode 2 — Shared HMAC secret for HS256 (standalone, no auth service)
      # Must be at least 32 characters. Use existingSecret in production.
      hmacSecret: ""

    multiTenant:
      # Optional: excalibase provisioning API for per-tenant DB credential routing
      # Only needed for full multi-tenant mode (Mode 3)
      provisioningUrl: ""
      # PAT for authenticating provisioning API calls (use existingSecret in production)
      provisioningPat: ""
      # Reference an existing Secret for provisioning PAT
      existingSecret: ""
      existingPatKey: "provisioning-pat"

  # NATS CDC subscription (events from excalibase-watcher)
  nats:
    enabled: false
    url: "nats://nats:4222"
    streamName: "CDC"
    subjectPrefix: "cdc"

  # TTL cache for schema reflection (minutes)
  cache:
    schemaTtlMinutes: 30

# ---------------------------------------------------------------------------
# Connection pool (HikariCP) — per data source
# Formula: (target_db_CPU × 2 + 1) / replicas
# With AbstractRoutingDataSource, each DB gets its own pool.
# Total connections from pod = pool × number_of_data_sources
#
# Example: 2 CPU PostgreSQL + 2 CPU MySQL, 2 replicas
#   per_source = (2×2+1)/2 = 3 → set to 5 for headroom
#   total from pod = 5 × 2 sources = 10 connections
# ---------------------------------------------------------------------------
hikari:
  maximumPoolSize: 10
  minimumIdle: 3
  connectionTimeout: 10000
  idleTimeout: 300000
  maxLifetime: 900000

# ---------------------------------------------------------------------------
# Tomcat tuning
# ---------------------------------------------------------------------------
tomcat:
  threadsMax: 200
  threadsMinSpare: 10
  maxConnections: 8192
  acceptCount: 100
  connectionTimeout: 20000

# JVM — Generational ZGC (default in Java 25)
jvm:
  opts: "-XX:+UseZGC -XX:+ZGenerational -XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"

# Enable Java 25 virtual threads
virtualThreads:
  enabled: true

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Liveness / readiness probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Extra env vars (passed directly to the container)
# ---------------------------------------------------------------------------
extraEnv: []
# - name: LOGGING_LEVEL_IO_GITHUB_EXCALIBASE
#   value: DEBUG

# Extra volumes / mounts (e.g. for TLS certs)
extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
