# Default values for excalibase-graphql

replicaCount: 1

image:
  repository: excalibase/excalibase-graphql
  pullPolicy: IfNotPresent
  # Use "native" tag for GraalVM native binary (faster startup, lower memory)
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 10000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: excalibase.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: excalibase-tls
  #   hosts:
  #     - excalibase.local

# ---------------------------------------------------------------------------
# Gateway API (recommended over Ingress — the community ingress-nginx is being
# retired; Gateway API is its CNCF successor, e.g. Envoy Gateway).
# Renders an HTTPRoute and, optionally, the Gateway itself. WebSocket upgrades
# are handled automatically; the only knob that matters for long-lived sockets
# is the client idle timeout (envoyGateway.clientTrafficPolicy below).
# ---------------------------------------------------------------------------
gatewayApi:
  enabled: false

  # GatewayClass to use. Must already exist — created by your Gateway API
  # controller install (Envoy Gateway's default class is "eg").
  gatewayClassName: eg

  # true  → this chart creates the Gateway.
  # false → attach the HTTPRoute to an existing shared Gateway (set parentRef).
  createGateway: true

  parentRef:
    name: ""          # blank → chart fullname (the Gateway created above)
    namespace: ""     # blank → release namespace
    sectionName: ""   # listener name; blank → all listeners

  hostnames:
    - excalibase.local

  listener:
    name: http
    port: 80
    protocol: HTTP    # HTTPS + tls below to terminate TLS at the gateway
    tls: {}
      # mode: Terminate
      # certificateRefs:
      #   - name: excalibase-tls

  # Envoy Gateway-specific CRD. Only valid when your controller IS Envoy Gateway.
  # On other implementations leave disabled and use their own timeout mechanism.
  envoyGateway:
    clientTrafficPolicy:
      enabled: false
      # Rendered verbatim under ClientTrafficPolicy.spec.timeout. With the app
      # heartbeat (25s) the Envoy default (300s) already survives — raise this
      # only if you disable the heartbeat.
      timeout:
        http:
          idleTimeout: 1h

# ---------------------------------------------------------------------------
# Database connection
# ---------------------------------------------------------------------------
database:
  # Full JDBC URL — the database type is auto-detected from the URL prefix:
  #   jdbc:postgresql://...  →  postgres
  #   jdbc:mysql://...       →  mysql
  # PostgreSQL example: jdbc:postgresql://postgres-host:5432/mydb
  # MySQL example:      jdbc:mysql://mysql-host:3306/mydb
  url: ""

  # Override auto-detection only if needed (e.g. custom JDBC wrapper URLs)
  # Leave empty to auto-detect from url above.
  type: ""

  # Inline credentials (use existingSecret in production)
  username: ""
  password: ""

  # Reference an existing Secret instead of inline credentials
  # The secret must have keys matching existingSecretUsernameKey / existingSecretPasswordKey
  existingSecret: ""
  existingSecretUsernameKey: "username"
  existingSecretPasswordKey: "password"

# ---------------------------------------------------------------------------
# Application settings
# ---------------------------------------------------------------------------
app:
  # Schema/database name to expose via GraphQL
  allowedSchema: "public"

  # Server port (must match service.port)
  port: 10000

  security:
    # Enable JWT verification. When true, the JWKS endpoint or a static public key is required.
    # Invalid tokens return 401. Missing tokens are allowed (RLS at the DB level controls access).
    jwtEnabled: false

    auth:
      # Mode 1 — JWKS endpoint (excalibase-auth ES256, Auth0, Keycloak, any OIDC provider)
      jwksUrl: ""
      # JWKS key cache TTL in minutes (default: 60)
      jwksTtlMinutes: 60
      # Mode 2 — Shared HMAC secret for HS256 (standalone, no auth service)
      # Must be at least 32 characters. Use existingSecret in production.
      hmacSecret: ""

    multiTenant:
      # Optional: excalibase provisioning API for per-tenant DB credential routing
      # Only needed for full multi-tenant mode (Mode 3)
      provisioningUrl: ""
      # PAT for authenticating provisioning API calls (use existingSecret in production)
      provisioningPat: ""
      # Reference an existing Secret for provisioning PAT
      existingSecret: ""
      existingPatKey: "provisioning-pat"

  # NATS CDC subscription (events from excalibase-watcher)
  nats:
    enabled: false
    url: "nats://nats:4222"
    streamName: "CDC"
    subjectPrefix: "cdc"

  # TTL cache for schema reflection (minutes)
  cache:
    schemaTtlMinutes: 30

# ---------------------------------------------------------------------------
# Connection pool (HikariCP) — per data source
# Formula: (target_db_CPU × 2 + 1) / replicas
# With AbstractRoutingDataSource, each DB gets its own pool.
# Total connections from pod = pool × number_of_data_sources
#
# Example: 2 CPU PostgreSQL + 2 CPU MySQL, 2 replicas
#   per_source = (2×2+1)/2 = 3 → set to 5 for headroom
#   total from pod = 5 × 2 sources = 10 connections
# ---------------------------------------------------------------------------
hikari:
  maximumPoolSize: 10
  minimumIdle: 3
  connectionTimeout: 10000
  idleTimeout: 300000
  maxLifetime: 900000

# ---------------------------------------------------------------------------
# Tomcat tuning
# ---------------------------------------------------------------------------
tomcat:
  threadsMax: 200
  threadsMinSpare: 10
  maxConnections: 8192
  acceptCount: 100
  connectionTimeout: 20000

# JVM — Generational ZGC (default in Java 25)
jvm:
  opts: "-XX:+UseZGC -XX:+ZGenerational -XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=75.0"

# Enable Java 25 virtual threads
virtualThreads:
  enabled: true

# ---------------------------------------------------------------------------
# Realtime / WebSocket keepalive
# Sends a native PING to every open socket on this interval so idle proxies,
# load balancers, and NAT gateways don't reap long-lived subscriptions. Keep it
# below every idle timeout in the request path. 0 disables.
# ---------------------------------------------------------------------------
websocket:
  heartbeatSeconds: 25

# ---------------------------------------------------------------------------
# Graceful shutdown & rollout — matters most with long-lived WebSockets, so a
# deploy or node drain doesn't sever sockets mid-message.
# ---------------------------------------------------------------------------
lifecycle:
  # Spring Boot graceful shutdown: stop accepting new work, drain in-flight.
  gracefulShutdown: true
  shutdownPhaseTimeout: "30s"
  # Seconds the preStop hook waits so the Gateway/Service stops routing new
  # connections to this pod before SIGTERM reaches the app. Uses the native
  # k8s `sleep` lifecycle action (requires k8s >= 1.30; 0 disables).
  preStopSleepSeconds: 5

# Must exceed preStopSleepSeconds + shutdownPhaseTimeout.
terminationGracePeriodSeconds: 45

# Rolling update — keep realtime capacity up during a deploy.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# Spread replicas across nodes:
#   ""     → off (correct for single-node — nothing to spread across)
#   "soft" → preferred (best-effort)
#   "hard" → required (only when nodes >= replicas, e.g. 3-node HA)
# Ignored when `affinity` below is set explicitly.
podAntiAffinity: ""

# PodDisruptionBudget — keep N pods up during voluntary disruptions (node drain,
# cluster upgrades). LEAVE DISABLED ON SINGLE-NODE: a PDB over a single replica
# makes the only pod non-evictable and blocks node drain forever.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1   # set one or the other, not both

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  # targetMemoryUtilizationPercentage: 80
  # WebSocket sockets are pinned to a pod, so scaling DOWN churns live
  # connections (clients must reconnect). Hold a long stabilization window
  # before removing a pod. Scaling UP only helps new clients — existing
  # sockets stay on their original pod.
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600

# ---------------------------------------------------------------------------
# Liveness / readiness probes
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Extra env vars (passed directly to the container)
# ---------------------------------------------------------------------------
extraEnv: []
# - name: LOGGING_LEVEL_IO_GITHUB_EXCALIBASE
#   value: DEBUG

# Extra volumes / mounts (e.g. for TLS certs)
extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
