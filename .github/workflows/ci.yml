name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '*.md'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '*.md'
      - '.github/workflows/docs.yml'

env:
  MAVEN_OPTS: "-Djava.awt.headless=true"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

jobs:
  test:
    name: Run Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Run tests with coverage
      run: mvn clean verify ${{ env.MAVEN_CLI_OPTS }}

    - name: Add coverage to PR
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      if: github.event_name == 'pull_request'
      with:
        paths: |
          ${{ github.workspace }}/modules/excalibase-graphql-api/target/site/jacoco-aggregate/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 40
        min-coverage-changed-files: 60

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: modules/excalibase-graphql-api/target/site/jacoco-aggregate/
        retention-days: 7

  build:
    name: Build & Package
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
          
    - name: Build with Make
      run: make build
      
    - name: Upload JAR artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts
        path: modules/excalibase-graphql-api/target/*.jar
        retention-days: 7

  build-native:
    name: Build Native Image
    needs: test
    runs-on: ubuntu-latest
    # Only on push to main — native compile takes ~10 min, skip on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up GraalVM JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'graalvm'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-native-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-native-
          ${{ runner.os }}-maven-

    - name: Install native-image prerequisites
      run: sudo apt-get update && sudo apt-get install -y gcc zlib1g-dev

    - name: Build native image
      run: mvn -pl modules/excalibase-graphql-api --also-make -Pnative package -DskipTests ${{ env.MAVEN_CLI_OPTS }}

    - name: Upload native binary
      uses: actions/upload-artifact@v4
      with:
        name: native-binary
        path: modules/excalibase-graphql-api/target/excalibase-graphql-api
        retention-days: 7