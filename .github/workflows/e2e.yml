name: End-to-End Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '*.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch: # Allow manual triggering

jobs:
  postgres-e2e:
    name: Postgres E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
          
    - name: Download JAR artifacts (if from workflow_run)
      if: github.event_name == 'workflow_run'
      uses: actions/download-artifact@v4
      with:
        name: jar-artifacts
        path: modules/excalibase-graphql-api/target/
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (required by make targets)
      run: |
        # Install docker-compose if missing (GitHub Actions has 'docker compose' but make uses 'docker-compose')
        if ! command -v docker-compose >/dev/null 2>&1; then
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
        fi
        
    - name: Run complete E2E test suite (queries, mutations, CDC subscriptions)
      run: make ci
      
    - name: Upload application logs on failure
      if: failure()
      run: |
        echo "📋 Collecting application logs..."
        if docker-compose -f docker-compose.yml -p excalibase-e2e logs excalibase-app > app-logs.txt 2>&1; then
          echo "✅ Logs collected"
        else
          echo "⚠️ No logs available or services not running"
        fi
        
    - name: Upload logs as artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: postgres-e2e-logs
        path: |
          app-logs.txt
        retention-days: 3
        if-no-files-found: ignore

  mysql-e2e:
    name: MySQL E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run MySQL E2E tests
      run: make mysql-e2e

    - name: Upload logs as artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: mysql-e2e-logs
        path: |
          app-logs.txt
        retention-days: 3
        if-no-files-found: ignore

